<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Server Welcome</title>

<style>

/* =========================
   CUSTOMIZATION KNOBS
   ========================= */

:root{

--title-font: Impact, Arial Black, sans-serif;
--description-font: Georgia, serif;

--title-color: #ffffff;
--description-color: #dddddd;

--text-alignment: center;

--panel-background: rgba(0,0,0,0.70);

}


/* =========================
   PAGE BASE
   ========================= */

body{
margin:0;
font-family:Arial, sans-serif;
background:#111;
color:white;
}


/* =========================
   LAYOUT
   ========================= */

.container{
width:95%;
margin:30px auto 0 auto;
display:flex;
gap:20px;
align-items:flex-start;
}


/* =========================
   LEFT PANEL
   ========================= */

.left{
width:40%;
background:var(--panel-background);
padding:20px;
border-radius:8px;
}


/* HEADER TEXT */

.header{
text-align:var(--text-alignment);
}

.header h1{
margin-top:0;
font-family:var(--title-font);
color:var(--title-color);
}

.header p{
font-family:var(--description-font);
color:var(--description-color);
font-size:18px;
margin-bottom:20px;
}


/* LEFT IMAGE SLIDESHOW */

.left-slideshow img{
width:100%;
border-radius:6px;
}


/* =========================
   RIGHT PANEL
   ========================= */

.right{
width:60%;
background:var(--panel-background);
padding:10px;
border-radius:8px;
}

.right img{
width:100%;
border-radius:6px;
}


/* =========================
   SLIDE CONTROL
   ========================= */

.slide{
display:none;
}

.slide.active{
display:block;
}

</style>
</head>

<body>

<div class="container">


<div class="left">

<div class="header">
<h1>Welcome to the Server</h1>

<p>
If you haven't downloaded the addons collection yet, please open the Steam Workshop and search for "Greys 2026 Server Mods". 
This will make it alot faster for you to join!
</p>

</div>


<div class="left-slideshow">

<img class="slide active" src="images/step1.png">
<img class="slide" src="images/step2.png">
<img class="slide" src="images/step3.png">

</div>

</div>



<div class="right">

<img id="rightSlide" src="server1.jpg">

</div>

</div>


<script>

/* LEFT slideshow */

let leftSlides = document.querySelectorAll(".left-slideshow .slide");
let leftIndex = 0;

function nextLeft(){

leftSlides[leftIndex].classList.remove("active");
leftIndex = (leftIndex + 1) % leftSlides.length;
leftSlides[leftIndex].classList.add("active");

}

setInterval(nextLeft,5000);



/* RIGHT slideshow */

let rightImages = [

"images/Day_grey.png",
"images/chat.png",
"images/furry.jpg",
"images/grind.jpg",
"images/small_grey.png",
"images/heckdivers.png",
"images/Grey_night.png"

];

let rightIndex = 0;

function nextRight(){

rightIndex = (rightIndex + 1) % rightImages.length;
document.getElementById("rightSlide").src = rightImages[rightIndex];

}

setInterval(nextRight,6000);

</script>

</body>
</html>
