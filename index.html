<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Server Welcome</title>

<style>

/* =========================
   CUSTOMIZATION KNOBS
   ========================= */

:root{

--title-font: Impact, Arial Black, sans-serif;
--description-font: Georgia, serif;

--title-color: #ffffff;
--description-color: #dddddd;

--text-alignment: center;

--panel-background: rgba(0,0,0,0.70);

}


/* =========================
   PAGE BASE
   ========================= */

body{
margin:0;
font-family:Arial, sans-serif;
background:#111;
color:white;
}


/* =========================
   LAYOUT
   ========================= */

.container{
width:95%;
margin:30px auto 0 auto;
display:flex;
gap:20px;
align-items:flex-start;
}


/* =========================
   LEFT PANEL
   ========================= */

.left{
width:40%;
background:var(--panel-background);
padding:20px;
border-radius:8px;
}


/* HEADER TEXT */

.header{
text-align:var(--text-alignment);
}

.header h1{
margin-top:0;
font-family:var(--title-font);
color:var(--title-color);
}

.header p{
font-family:var(--description-font);
color:var(--description-color);
font-size:18px;
margin-bottom:20px;
}


/* LEFT IMAGE SLIDESHOW */

.left-slideshow img{
width:100%;
border-radius:6px;
}


/* =========================
   RIGHT PANEL
   ========================= */

.right{
width:60%;
background:var(--panel-background);
padding:10px;
border-radius:8px;
}

.right img{
width:100%;
border-radius:6px;
}


/* =========================
   SLIDE CONTROL
   ========================= */

.slide{
display:none;
}

.slide.active{
display:block;
}

</style>
</head>

<body>

<div class="container">


<div class="left">

<div class="header">
<h1>Welcome Greys Gmod Funtime!</h1>

<p>
If you haven't downloaded the addons collection yet, please open the Steam Workshop and search for "Greys 2026 Server Mods". 
This will make it alot faster for you to join!
</p>

</div>


<div class="left-slideshow">

<img class="slide active" src="images/Steps/Step1.png">
<img class="slide" src="images/Steps/Step2.png">
<img class="slide" src="imagesSteps/Step3.png">

</div>

</div>



<div class="right">

<img id="rightSlide" src="images/2.jpg">

</div>

</div>


<script>

/* LEFT slideshow */

let leftSlides = document.querySelectorAll(".left-slideshow .slide");
let leftIndex = 0;

function nextLeft(){

leftSlides[leftIndex].classList.remove("active");
leftIndex = (leftIndex + 1) % leftSlides.length;
leftSlides[leftIndex].classList.add("active");

}

setInterval(nextLeft,5000);



/* RIGHT slideshow */

let rightImages = [

"images/1.jpg",
"images/2.jpg",
"images/3.jpg",
"images/4.png",
"images/5.png",
"images/6.jpg",
"images/7.png",
"images/8.png",
"images/9.jpg",
"images/10.jpg",
"images/11.png",
"images/12.jpg",
"images/13.jpg",
"images/14.jpg",
"images/15.jpg",
"images/16.jpg",
"images/17.png",
];

function shuffleArray(array){
for(let i = array.length - 1; i > 0; i--){
const j = Math.floor(Math.random() * (i + 1));
[array[i], array[j]] = [array[j], array[i]];
}
}

function randomDelay(){
return Math.floor(Math.random() * 2000) + 4000;
}

let rightIndex = 0;
let rightSlide = document.getElementById("rightSlide");

shuffleArray(rightImages);
rightSlide.src = rightImages[rightIndex];

function nextRight(){

rightIndex++;

if(rightIndex >= rightImages.length){
rightIndex = 0;
shuffleArray(rightImages);
}

rightSlide.src = rightImages[rightIndex];
setTimeout(nextRight, randomDelay());

}

setTimeout(nextRight, randomDelay());

</script>
</body>
</html>
